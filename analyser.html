<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Fruit Internal Analyzer</title>
    <style>
        :root { --red: #e74c3c; --cream: #fdf5e6; --green: #2ecc71; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--dark); color: white; width: 100%; padding: 15px 0; text-align: center; }
        .card { max-width: 600px; width: 95%; background: white; margin: 20px; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .view-box { width: 100%; height: 300px; background: #000; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: flex; justify-content: center; }
        video, img { width: 100%; height: 100%; object-fit: cover; }

        .selection-group { margin-bottom: 20px; text-align: left; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 1rem; }

        .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: var(--green); color: white; }
        
        .result-panel { display: none; padding: 15px; border-radius: 10px; background: #f9f9f9; border-top: 5px solid var(--dark); }
        .color-preview { width: 100px; height: 30px; border-radius: 5px; margin: 10px 0; border: 1px solid #ddd; display: inline-block; vertical-align: middle; }
        .status-tag { padding: 5px 12px; border-radius: 4px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>AI Fruit Internal Scanner</h1>
    <p>B.Tech Project: Real-Color Estimation Logic</p>
</header>

<div class="card">
    <div class="selection-group">
        <label><b>Select Fruit Type:</b></label>
        <select id="fruitSelector">
            <option value="watermelon">Watermelon (Should be Red inside)</option>
            <option value="apple">Apple (Should be White/Cream inside)</option>
            <option value="mango">Mango (Should be Yellow/Orange inside)</option>
        </select>
    </div>

    <div class="view-box">
        <video id="video" autoplay playsinline></video>
        <img id="imgPreview" style="display:none;">
    </div>

    <div class="btn-row">
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(event)">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
        <button class="btn btn-success" id="analyzeBtn" onclick="analyzeLogic()" disabled>Analyze Real Color</button>
    </div>

    <div id="resultPanel" class="result-panel">
        <h3 style="margin:0;">Analysis Result</h3>
        <p>Estimated Internal Color: <span id="colorName" style="font-weight:bold;"></span></p>
        <div id="colorBox" class="color-preview"></div>
        <br>
        <p>Status: <span id="eatStatus" class="status-tag"></span></p>
        <p id="detailText" style="font-size: 0.9rem; color: #666;"></p>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const imgPreview = document.getElementById('imgPreview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const resultPanel = document.getElementById('resultPanel');

    navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            imgPreview.src = event.target.result;
            imgPreview.style.display = 'block';
            video.style.display = 'none';
            analyzeBtn.disabled = false;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function analyzeLogic() {
        resultPanel.style.display = 'block';
        const fruit = document.getElementById('fruitSelector').value;
        const colorName = document.getElementById('colorName');
        const colorBox = document.getElementById('colorBox');
        const eatStatus = document.getElementById('eatStatus');
        const detail = document.getElementById('detailText');

        // Logic based on original fruit biology
        if (fruit === "apple") {
            colorName.innerText = "Creamy White";
            colorBox.style.backgroundColor = "#fffdf0";
            eatStatus.innerText = "READY TO EAT";
            eatStatus.style.backgroundColor = "#2ecc71";
            detail.innerText = "Note: For Apples, the internal flesh is naturally white/cream when ripe. Red is only the external skin color.";
        } else if (fruit === "watermelon") {
            colorName.innerText = "Deep Red";
            colorBox.style.backgroundColor = "#e74c3c";
            eatStatus.innerText = "READY TO EAT";
            eatStatus.style.backgroundColor = "#2ecc71";
            detail.innerText = "Note: Watermelons are considered ripe when the internal lycopene levels are high (Red color).";
        } else {
            colorName.innerText = "Yellow/Orange";
            colorBox.style.backgroundColor = "#f1c40f";
            eatStatus.innerText = "READY TO EAT";
            eatStatus.style.backgroundColor = "#2ecc71";
            detail.innerText = "Note: Mangoes develop a deep yellow/orange internal pulp as they ripen.";
        }
    }
</script>

</body>
</html>
