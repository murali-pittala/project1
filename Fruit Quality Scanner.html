<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fruit Scanner</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #preview { width: 100%; max-height: 300px; object-fit: contain; margin-top: 15px; border-radius: 8px; display: none; }
        .upload-btn { background: #007bff; color: white; padding: 12px; border-radius: 5px; cursor: pointer; display: inline-block; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; }
        .ripe { background: #d4edda; color: #155724; }
        .almost { background: #fff3cd; color: #856404; }
        .unripe { background: #f8d7da; color: #721c24; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fruit Quality Scanner</h2>
    <p>Upload or take a photo of the fruit's interior/skin</p>
    
    <label class="upload-btn">
        📸 Capture / Upload Image
        <input type="file" id="imageInput" accept="image/*" capture="environment" hidden>
    </label>

    <img id="preview" src="#" alt="Fruit Preview">
    <canvas id="canvas"></canvas>

    <div id="result" class="result-box" style="display:none;"></div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const resultDiv = document.getElementById('result');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            preview.src = event.target.result;
            preview.style.display = 'block';
            
            // Wait for image to load to analyze pixels
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                analyzeImage(img);
            };
        };
        reader.readAsDataURL(file);
    });

    function analyzeImage(img) {
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        // Sample the middle of the image (100x100 square)
        const centerX = img.width / 2;
        const centerY = img.height / 2;
        const imageData = ctx.getImageData(centerX - 50, centerY - 50, 100, 100).data;

        let r = 0, g = 0, b = 0;
        for (let i = 0; i < imageData.length; i += 4) {
            r += imageData[i];
            g += imageData[i+1];
            b += imageData[i+2];
        }

        // Average RGB
        const count = imageData.length / 4;
        r = r / count;
        g = g / count;
        b = b / count;

        // Simple ripeness logic based on "Yellow/Redness"
        // In digital color, Yellow/Red has high Red and Green values
        const colorIntensity = (r + g) / 2; 
        const ripenessScore = Math.min(100, (colorIntensity / 255) * 100);

        displayResult(ripenessScore);
    }

    function displayResult(score) {
        resultDiv.style.display = 'block';
        resultDiv.className = 'result-box';
        
        if (score > 70) {
            resultDiv.innerText = "Status: Ripe & Good to Eat!";
            resultDiv.classList.add('ripe');
        } else if (score > 40) {
            resultDiv.innerText = "Status: Almost Ripe";
            resultDiv.classList.add('almost');
        } else {
            resultDiv.innerText = "Status: Unripe / Not Ready";
            resultDiv.classList.add('unripe');
        }
    }
</script>

</body>
</html>
