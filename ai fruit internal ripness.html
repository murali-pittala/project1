<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fruit Quality Lab</title>
    <style>
        :root {
            --ripe-color: #2ecc71;
            --almost-color: #f1c40f;
            --unripe-color: #e74c3c;
            --mushy-color: #8e44ad;
            --damaged-color: #e67e22;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; display: flex; justify-content: center; padding: 20px; color: #333; }
        .app-card { background: white; width: 100%; max-width: 400px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #333; color: white; padding: 20px; text-align: center; }
        .preview-container { position: relative; width: 100%; height: 300px; background: #eee; overflow: hidden; }
        #preview { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; top: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.5); animation: scan 2s infinite; display: none; }
        .controls { padding: 20px; }
        .btn-upload { background: #007bff; color: white; padding: 15px; border-radius: 12px; display: block; text-align: center; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .results-panel { background: #f8f9fa; margin: 0 20px 20px; padding: 15px; border-radius: 12px; display: none; border: 1px solid #ddd; }
        .status-badge { font-size: 1.3rem; font-weight: 800; text-align: center; margin-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h3>AI Fruit Ripeness Lab</h3>
    </div>

    <div class="preview-container">
        <div id="scanLine" class="scan-line"></div>
        <img id="preview" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ccc' d='M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z'/%3E%3C/svg%3E">
    </div>

    <div class="controls">
        <label class="btn-upload">
            📷 SNAP OR UPLOAD FRUIT
            <input type="file" id="imageInput" accept="image/*" capture="environment" hidden>
        </label>
        <p style="font-size: 0.8rem; color: #666; text-align: center;">Tip: Good lighting improves damage detection!</p>
    </div>

    <div id="results" class="results-panel">
        <div id="statusText" class="status-badge">Analyzing...</div>
        <div class="data-row"><span>Ripeness (Color):</span> <b id="valColor">0%</b></div>
        <div class="data-row"><span>Texture Score:</span> <b id="valTexture">0%</b></div>
        <div class="data-row"><span>Surface Health:</span> <b id="valHealth">0%</b></div>
        <div id="advice" style="margin-top:10px; font-size: 0.85rem; font-style: italic; color: #555;"></div>
    </div>

    <canvas id="calcCanvas"></canvas>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const resultsPanel = document.getElementById('results');
    const scanLine = document.getElementById('scanLine');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        scanLine.style.display = 'block';
        resultsPanel.style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = (f) => {
            preview.src = f.target.result;
            const img = new Image();
            img.src = f.target.result;
            img.onload = () => {
                setTimeout(() => {
                    analyze(img);
                    scanLine.style.display = 'none';
                }, 800);
            };
        };
        reader.readAsDataURL(file);
    });

    function analyze(img) {
        const canvas = document.getElementById('calcCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200;
        canvas.height = 200;
        ctx.drawImage(img, 0, 0, 200, 200);

        const imgData = ctx.getImageData(0, 0, 200, 200).data;
        let rSum = 0, gSum = 0, textureVar = 0, defectPixels = 0;

        for (let i = 0; i < imgData.length; i += 4) {
            const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
            const brightness = (r + g + b) / 3;

            rSum += r;
            gSum += g;
            
            // Defect Detection: Look for dark brownish spots
            // Damage is usually low in blue and generally dark (brightness < 100)
            const isBrownish = (r > b * 1.3 && g > b && r < 160);
            const isDarkRot = (brightness < 55); 
            
            if (isBrownish || isDarkRot) {
                defectPixels++;
            }

            if (i > 0) {
                let prev = (imgData[i-4] + imgData[i-3] + imgData[i-2]) / 3;
                textureVar += Math.abs(brightness - prev);
            }
        }

        const totalPixels = imgData.length / 4;
        const colorScore = Math.min(100, ((rSum/totalPixels + gSum/totalPixels) / 450) * 100);
        const textureScore = Math.max(0, 100 - (textureVar / totalPixels * 2.5));
        const healthScore = Math.max(0, 100 - (defectPixels / totalPixels * 300)); // Magnify defect impact

        updateUI(colorScore, textureScore, healthScore);
    }

    function updateUI(color, texture, health) {
        resultsPanel.style.display = 'block';
        document.getElementById('valColor').innerText = Math.round(color) + "%";
        document.getElementById('valTexture').innerText = Math.round(texture) + "%";
        document.getElementById('valHealth').innerText = Math.round(health) + "%";

        const status = document.getElementById('statusText');
        const advice = document.getElementById('advice');

        if (health < 60) {
            status.innerText = "⚠️ DAMAGED / ROT DETECTED";
            status.style.color = "var(--damaged-color)";
            advice.innerText = "We detected dark spots or bruising. Check for rot before eating.";
        } else if (texture < 45) {
            status.innerText = "❌ OVERRIPE / MUSHY";
            status.style.color = "var(--mushy-color)";
            advice.innerText = "The fruit feels too soft internally. Best used for juices.";
        } else if (color > 70 && health > 85) {
            status.innerText = "✅ RIPE & HEALTHY";
            status.style.color = "var(--ripe-color)";
            advice.innerText = "Surface is clean and ripeness is perfect. Enjoy!";
        } else if (color > 40) {
            status.innerText = "⏳ ALMOST RIPE";
            status.style.color = "var(--almost-color)";
            advice.innerText = "Looks healthy! Give it 1-2 days to reach full sweetness.";
        } else {
            status.innerText = "🍏 UNRIPE";
            status.style.color = "var(--unripe-color)";
            advice.innerText = "Clean but very firm. Leave it at room temperature to ripen.";
        }
    }
</script>

</body>
</html>
